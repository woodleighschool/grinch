---
openapi: 3.0.3
info:
  title: Grinch API
  version: 0.1.0
servers:
  - url: /api/v1
security:
  - sessionAuth: []
paths:
  /executables:
    get:
      operationId: listExecutables
      tags:
        - executables
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
      responses:
        '200':
          description: Executable list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutableListResponse'
  /executables/{id}:
    get:
      operationId: getExecutable
      tags:
        - executables
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Executable detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Executable'
  /execution-events:
    get:
      operationId: listExecutionEvents
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
        - $ref: '#/components/parameters/MachineIdFilter'
        - $ref: '#/components/parameters/UserIdFilter'
        - $ref: '#/components/parameters/ExecutableIdFilter'
        - $ref: '#/components/parameters/ExecutionDecisionFilter'
      responses:
        '200':
          description: Execution event list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionEventListResponse'
  /execution-events/{id}:
    get:
      operationId: getExecutionEvent
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Execution event detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionEvent'
    delete:
      operationId: deleteExecutionEvent
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Execution event deleted.
  /file-access-events:
    get:
      operationId: listFileAccessEvents
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
        - $ref: '#/components/parameters/MachineIdFilter'
        - $ref: '#/components/parameters/FileAccessDecisionFilter'
      responses:
        '200':
          description: File access event list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAccessEventListResponse'
  /file-access-events/{id}:
    get:
      operationId: getFileAccessEvent
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: File access event detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAccessEvent'
    delete:
      operationId: deleteFileAccessEvent
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: File access event deleted.
  /groups:
    get:
      operationId: listGroups
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
      responses:
        '200':
          description: Group list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
    post:
      operationId: createGroup
      tags:
        - groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
  /groups/{id}:
    get:
      operationId: getGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Group detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    put:
      operationId: updateGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '200':
          description: Group updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    delete:
      operationId: deleteGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Group deleted.
  /groups/{id}/machines/{machine_id}:
    put:
      operationId: addGroupMachine
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/MachineIdPath'
      responses:
        '204':
          description: Machine added to group.
    delete:
      operationId: removeGroupMachine
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/MachineIdPath'
      responses:
        '204':
          description: Machine removed from group.
  /groups/{id}/users/{user_id}:
    put:
      operationId: addGroupUser
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User added to group.
    delete:
      operationId: removeGroupUser
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User removed from group.
  /machines:
    get:
      operationId: listMachines
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
        - $ref: '#/components/parameters/UserIdFilter'
        - $ref: '#/components/parameters/MachineRuleSyncStatusFilter'
        - $ref: '#/components/parameters/MachineClientModeFilter'
      responses:
        '200':
          description: Machine list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MachineListResponse'
  /machines/{id}:
    get:
      operationId: getMachine
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Machine detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
    delete:
      operationId: deleteMachine
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Machine deleted.
  /rules:
    get:
      operationId: listRules
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
        - $ref: '#/components/parameters/EnabledFilter'
        - $ref: '#/components/parameters/RuleTypeFilter'
      responses:
        '200':
          description: Rule list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListResponse'
    post:
      operationId: createRule
      tags:
        - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreateRequest'
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
  /rules/{id}:
    get:
      operationId: getRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Rule detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
    put:
      operationId: updateRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpdateRequest'
      responses:
        '200':
          description: Rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
    delete:
      operationId: deleteRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Rule deleted.
  /users:
    get:
      operationId: listUsers
      tags:
        - users
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/IdsFilter'
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
  /users/{id}:
    get:
      operationId: getUser
      tags:
        - users
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: grinch_session
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    Search:
      name: search
      in: query
      schema:
        type: string
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field name.
    Order:
      name: order
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
    IdsFilter:
      name: ids[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          format: uuid
    EnabledFilter:
      name: enabled[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          type: boolean
    UserIdFilter:
      name: user_id
      in: query
      schema:
        type: string
        format: uuid
    UserIdPath:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MachineIdFilter:
      name: machine_id
      in: query
      schema:
        type: string
        format: uuid
    MachineIdPath:
      name: machine_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutableIdFilter:
      name: executable_id
      in: query
      schema:
        type: string
        format: uuid
    GroupIdFilter:
      name: group_id
      in: query
      schema:
        type: string
        format: uuid
    RuleIdFilter:
      name: rule_id
      in: query
      schema:
        type: string
        format: uuid
    SubjectIdFilter:
      name: subject_id
      in: query
      schema:
        type: string
        format: uuid
    SubjectKindFilter:
      name: subject_kind
      in: query
      schema:
        $ref: '#/components/schemas/RuleTargetSubjectKind'
    RuleTypeFilter:
      name: rule_type[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/RuleType'
    RulePolicyFilter:
      name: policy
      in: query
      schema:
        $ref: '#/components/schemas/RulePolicy'
    MachineRuleSyncStatusFilter:
      name: rule_sync_status[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/MachineRuleSyncStatus'
    MachineClientModeFilter:
      name: client_mode[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/MachineClientMode'
    ExecutionDecisionFilter:
      name: decision[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExecutionDecision'
    FileAccessDecisionFilter:
      name: decision[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/FileAccessDecision'
  schemas:
    ExcludedGroup:
      x-go-type: domain.ExcludedGroup
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - group_id
      properties:
        group_id:
          type: string
          format: uuid
        group_name:
          type: string
    Executable:
      x-go-type: domain.Executable
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      allOf:
        - $ref: '#/components/schemas/ExecutableSummary'
        - type: object
          required:
            - signing_chain
            - entitlements
          properties:
            signing_chain:
              type: array
              items:
                $ref: '#/components/schemas/SigningChainEntry'
            entitlements:
              type: object
              additionalProperties: true
    ExecutableListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ExecutableSummary'
    ExecutableSummary:
      x-go-type: domain.ExecutableSummary
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - file_sha256
        - file_name
        - file_bundle_id
        - file_bundle_path
        - signing_id
        - team_id
        - cdhash
        - occurrences
        - created_at
      properties:
        id:
          type: string
          format: uuid
        file_sha256:
          type: string
        file_name:
          type: string
        file_bundle_id:
          type: string
        file_bundle_path:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        occurrences:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
    ExecutionDecision:
      x-go-type: domain.ExecutionDecision
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: string
      enum:
        - unknown
        - allow_unknown
        - allow_binary
        - allow_certificate
        - allow_scope
        - allow_team_id
        - allow_signing_id
        - allow_cd_hash
        - block_unknown
        - block_binary
        - block_certificate
        - block_scope
        - block_team_id
        - block_signing_id
        - block_cd_hash
        - bundle_binary
    ExecutionEvent:
      x-go-type: domain.ExecutionEvent
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - machine_id
        - executable_id
        - decision
        - file_path
        - file_name
        - file_sha256
        - file_bundle_id
        - file_bundle_path
        - signing_id
        - team_id
        - cdhash
        - executing_user
        - logged_in_users
        - current_sessions
        - signing_chain
        - entitlements
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
        decision:
          $ref: '#/components/schemas/ExecutionDecision'
        file_path:
          type: string
        file_name:
          type: string
        file_sha256:
          type: string
        file_bundle_id:
          type: string
        file_bundle_path:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        executing_user:
          type: string
        logged_in_users:
          type: array
          items:
            type: string
        current_sessions:
          type: array
          items:
            type: string
        signing_chain:
          type: array
          items:
            $ref: '#/components/schemas/SigningChainEntry'
        entitlements:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    ExecutionEventListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionEventSummary'
    ExecutionEventSummary:
      x-go-type: domain.ExecutionEventSummary
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - machine_id
        - executable_id
        - decision
        - file_path
        - file_name
        - signing_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
        decision:
          $ref: '#/components/schemas/ExecutionDecision'
        file_path:
          type: string
        file_name:
          type: string
        signing_id:
          type: string
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    FileAccessDecision:
      x-go-type: domain.FileAccessDecision
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: string
      enum:
        - unknown
        - denied
        - denied_invalid_signature
        - audit_only
    FileAccessEvent:
      x-go-type: domain.FileAccessEvent
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - machine_id
        - rule_version
        - rule_name
        - target
        - decision
        - file_name
        - file_sha256
        - signing_id
        - team_id
        - cdhash
        - process_chain
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        rule_version:
          type: string
        rule_name:
          type: string
        target:
          type: string
        decision:
          $ref: '#/components/schemas/FileAccessDecision'
        file_name:
          type: string
        file_sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        process_chain:
          type: array
          items:
            $ref: '#/components/schemas/FileAccessEventProcess'
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    FileAccessEventListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/FileAccessEventSummary'
    FileAccessEventProcess:
      x-go-type: domain.FileAccessEventProcess
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - pid
        - file_path
        - file_name
        - file_sha256
        - signing_id
        - team_id
        - cdhash
      properties:
        pid:
          type: integer
          format: int32
        file_path:
          type: string
        file_name:
          type: string
        file_sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
    FileAccessEventSummary:
      x-go-type: domain.FileAccessEventSummary
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - machine_id
        - decision
        - rule_name
        - target
        - file_name
        - file_sha256
        - signing_id
        - team_id
        - cdhash
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        decision:
          $ref: '#/components/schemas/FileAccessDecision'
        rule_name:
          type: string
        target:
          type: string
        file_name:
          type: string
        file_sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    Group:
      x-go-type: domain.Group
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - id
        - name
        - description
        - source
        - member_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        source:
          $ref: '#/components/schemas/Source'
        member_count:
          type: integer
          format: int32
        user_ids:
          type: array
          items:
            type: string
            format: uuid
        machine_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
    GroupListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    IncludeRuleTarget:
      x-go-type: domain.IncludeRuleTarget
      x-go-type-import:
        name: domain
        path: github.com/woodleighschool/grinch/internal/domain
      type: object
      required:
        - subject_kind
        - policy
      properties:
        subject_kind:
          $ref: '#/components/schemas/RuleTargetSubjectKind'
        subject_id:
          type: string
          format: uuid
          nullable: true
        subject_name:
          type: string
        policy:
          $ref: '#/components/schemas/RulePolicy'
        cel_expression:
