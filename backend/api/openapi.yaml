---
openapi: 3.0.3
info:
  title: Grinch API
  version: 0.1.0
servers:
  - url: /api/v1
security:
  - sessionAuth: []
paths:
  /executables:
    get:
      operationId: listExecutables
      tags:
        - executables
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Executable list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutableListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /executables/{id}:
    get:
      operationId: getExecutable
      tags:
        - executables
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Executable detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Executable'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
  /execution-events:
    get:
      operationId: listExecutionEvents
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/MachineIdFilter'
        - $ref: '#/components/parameters/UserIdFilter'
        - $ref: '#/components/parameters/ExecutableIdFilter'
      responses:
        '200':
          description: Execution event list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionEventListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /execution-events/{id}:
    get:
      operationId: getExecutionEvent
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Execution event detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionEvent'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteExecutionEvent
      tags:
        - execution-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Execution event deleted.
        default:
          $ref: '#/components/responses/Problem'
  /file-access-events:
    get:
      operationId: listFileAccessEvents
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/MachineIdFilter'
        - $ref: '#/components/parameters/ExecutableIdFilter'
      responses:
        '200':
          description: File access event list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAccessEventListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /file-access-events/{id}:
    get:
      operationId: getFileAccessEvent
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: File access event detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAccessEvent'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteFileAccessEvent
      tags:
        - file-access-events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: File access event deleted.
        default:
          $ref: '#/components/responses/Problem'
  /group-memberships:
    get:
      operationId: listGroupMemberships
      tags:
        - group-memberships
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/GroupIdFilter'
        - $ref: '#/components/parameters/UserIdFilter'
        - $ref: '#/components/parameters/MachineIdFilter'
      responses:
        '200':
          description: Group membership list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembershipListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createGroupMembership
      tags:
        - group-memberships
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupMembershipCreateRequest'
      responses:
        '201':
          description: Group membership created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembership'
        default:
          $ref: '#/components/responses/Problem'
  /group-memberships/{id}:
    get:
      operationId: getGroupMembership
      tags:
        - group-memberships
      parameters:
        - $ref: '#/components/parameters/GroupMembershipId'
      responses:
        '200':
          description: Group membership detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembership'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteGroupMembership
      tags:
        - group-memberships
      parameters:
        - $ref: '#/components/parameters/GroupMembershipId'
      responses:
        '204':
          description: Group membership deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
  /groups:
    get:
      operationId: listGroups
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Group list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createGroup
      tags:
        - groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        default:
          $ref: '#/components/responses/Problem'
  /groups/{id}:
    get:
      operationId: getGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Group detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '200':
          description: Group updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteGroup
      tags:
        - groups
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Group deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
  /machines:
    get:
      operationId: listMachines
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/UserIdFilter'
      responses:
        '200':
          description: Machine list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MachineListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /machines/{id}:
    get:
      operationId: getMachine
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Machine detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteMachine
      tags:
        - machines
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Machine deleted.
        default:
          $ref: '#/components/responses/Problem'
  /rules:
    get:
      operationId: listRules
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Rule list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createRule
      tags:
        - rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreateRequest'
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        default:
          $ref: '#/components/responses/Problem'
  /rules/{id}:
    get:
      operationId: getRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Rule detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpdateRequest'
      responses:
        '200':
          description: Rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteRule
      tags:
        - rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Rule deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
  /users:
    get:
      operationId: listUsers
      tags:
        - users
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /users/{id}:
    get:
      operationId: getUser
      tags:
        - users
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: grinch_session
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    Search:
      name: search
      in: query
      schema:
        type: string
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field name.
    Order:
      name: order
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
    UserIdFilter:
      name: user_id
      in: query
      schema:
        type: string
        format: uuid
    MachineIdFilter:
      name: machine_id
      in: query
      schema:
        type: string
        format: uuid
    ExecutableIdFilter:
      name: executable_id
      in: query
      schema:
        type: string
        format: uuid
    GroupIdFilter:
      name: group_id
      in: query
      schema:
        type: string
        format: uuid
    RuleIdFilter:
      name: rule_id
      in: query
      schema:
        type: string
        format: uuid
    SubjectIdFilter:
      name: subject_id
      in: query
      schema:
        type: string
        format: uuid
    GroupMembershipId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubjectKindFilter:
      name: subject_kind
      in: query
      schema:
        $ref: '#/components/schemas/RuleTargetSubjectKind'
    RulePolicyFilter:
      name: policy
      in: query
      schema:
        $ref: '#/components/schemas/RulePolicy'
  responses:
    Problem:
      description: Problem response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    EventDecision:
      type: string
      enum:
        - unknown
        - allow_unknown
        - allow_binary
        - allow_certificate
        - allow_scope
        - allow_team_id
        - allow_signing_id
        - allow_cd_hash
        - block_unknown
        - block_binary
        - block_certificate
        - block_scope
        - block_team_id
        - block_signing_id
        - block_cd_hash
        - bundle_binary
    ExcludedGroup:
      type: object
      required:
        - group_id
      properties:
        group_id:
          type: string
          format: uuid
        group_name:
          type: string
    Executable:
      allOf:
        - $ref: '#/components/schemas/ExecutableSummary'
        - type: object
          required:
            - signing_chain
            - entitlements
          properties:
            signing_chain:
              type: array
              items:
                $ref: '#/components/schemas/SigningChainEntry'
            entitlements:
              type: object
              additionalProperties: true
    ExecutableListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ExecutableSummary'
    ExecutableSource:
      type: string
      enum:
        - event
        - process
    ExecutableSummary:
      type: object
      required:
        - id
        - source
        - file_sha256
        - file_name
        - file_path
        - file_bundle_id
        - file_bundle_path
        - signing_id
        - team_id
        - cdhash
        - created_at
      properties:
        id:
          type: string
          format: uuid
        source:
          $ref: '#/components/schemas/ExecutableSource'
        file_sha256:
          type: string
        file_name:
          type: string
        file_path:
          type: string
        file_bundle_id:
          type: string
        file_bundle_path:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        created_at:
          type: string
          format: date-time
    ExecutionEvent:
      type: object
      required:
        - id
        - machine_id
        - executable_id
        - decision
        - file_path
        - file_name
        - file_sha256
        - file_bundle_id
        - file_bundle_path
        - signing_id
        - team_id
        - cdhash
        - executing_user
        - logged_in_users
        - current_sessions
        - signing_chain
        - entitlements
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
        decision:
          $ref: '#/components/schemas/EventDecision'
        file_path:
          type: string
        file_name:
          type: string
        file_sha256:
          type: string
        file_bundle_id:
          type: string
        file_bundle_path:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        executing_user:
          type: string
        logged_in_users:
          type: array
          items:
            type: string
        current_sessions:
          type: array
          items:
            type: string
        signing_chain:
          type: array
          items:
            $ref: '#/components/schemas/SigningChainEntry'
        entitlements:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    ExecutionEventListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionEventSummary'
    ExecutionEventSummary:
      type: object
      required:
        - id
        - machine_id
        - executable_id
        - decision
        - file_path
        - file_name
        - signing_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
        decision:
          $ref: '#/components/schemas/EventDecision'
        file_path:
          type: string
        file_name:
          type: string
        signing_id:
          type: string
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string
    FileAccessDecision:
      type: string
      enum:
        - unknown
        - denied
        - denied_invalid_signature
        - audit_only
    FileAccessEvent:
      type: object
      required:
        - id
        - machine_id
        - rule_version
        - rule_name
        - target
        - decision
        - file_name
        - file_sha256
        - signing_id
        - team_id
        - cdhash
        - process_chain
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
          nullable: true
        rule_version:
          type: string
        rule_name:
          type: string
        target:
          type: string
        decision:
          $ref: '#/components/schemas/FileAccessDecision'
        file_name:
          type: string
        file_sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        process_chain:
          type: array
          items:
            $ref: '#/components/schemas/FileAccessEventProcess'
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    FileAccessEventListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/FileAccessEventSummary'
    FileAccessEventProcess:
      type: object
      required:
        - pid
        - file_path
        - executable_id
        - file_name
      properties:
        pid:
          type: integer
          format: int32
        file_path:
          type: string
        executable_id:
          type: string
          format: uuid
        file_name:
          type: string
    FileAccessEventSummary:
      type: object
      required:
        - id
        - machine_id
        - executable_id
        - decision
        - rule_name
        - target
        - file_name
        - file_sha256
        - signing_id
        - team_id
        - cdhash
        - created_at
      properties:
        id:
          type: string
          format: uuid
        machine_id:
          type: string
          format: uuid
        executable_id:
          type: string
          format: uuid
          nullable: true
        decision:
          $ref: '#/components/schemas/FileAccessDecision'
        rule_name:
          type: string
        target:
          type: string
        file_name:
          type: string
        file_sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
        cdhash:
          type: string
        occurred_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    Group:
      type: object
      required:
        - id
        - name
        - description
        - source
        - member_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        source:
          $ref: '#/components/schemas/Source'
        member_count:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
    GroupListResponse:
      type: object
      required:
        - total
        - rows
      properties:
        total:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    GroupMembership:
      type: object
      required:
        - id
        - kind
        - group
        - member
        - created_at
        - updated_at
      properties:
        id:
          type: string
        kind:
          $ref: '#/components/schemas/GroupMembershipKind'
        group:
          $ref: '#/components/schemas/GroupMembershipGroup'
        member:
          $ref: '#/components/schemas/GroupMembershipMember'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupMembershipCreateRequest:
      type: object
      required:
        - group_id
        - member_kind
        - member_id
      properties:
        group_id:
          type: string
          format: uuid
        member_kind:
          $ref: '#/components/schemas/MemberKind'
        member_id:
          type: string
          format: uuid
    GroupMembershipGroup:
