version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../migrations"
    queries:
      - "queries"
    gen:
      go:
        package: "db"
        out: "."
        sql_package: "pgx/v5"
        rename:
          group_membership: "Membership"
          custom_url: "CustomURL"
          file_sha256: "FileSHA256"
          teamid_rule_count: "TeamIDRuleCount"
          signingid_rule_count: "SigningIDRuleCount"
          cdhash_rule_count: "CDHashRuleCount"
          desired_teamid_rule_count: "DesiredTeamIDRuleCount"
          desired_signingid_rule_count: "DesiredSigningIDRuleCount"
          desired_cdhash_rule_count: "DesiredCDHashRuleCount"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
